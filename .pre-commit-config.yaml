# Pre-commit hooks for latex2ufdissertation.
# Install: pip install pre-commit && pre-commit install
# Run on all files: pre-commit run --all-files

# Vendored upstream files and binary artifacts are excluded globally so we
# never modify upstream content or churn binaries. Everything else is fair
# game.
exclude: |
  (?x)^(
    latex2ufdissertation/pipeline/template/.*|
    tests/fixtures/demo_dissertation/ufdissertation\.cls|
    tests/fixtures/demo_dissertation/main\.pdf|
    .*\.pdf
  )$

repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-merge-conflict
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.4
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]
