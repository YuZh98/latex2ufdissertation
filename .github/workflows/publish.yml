name: Publish to PyPI

# Gated to v1.* tags: this workflow is dormant until v1.0.0, so pre-1.0 patch
# tags (v0.3.x) do not publish. release.yml handles the GitHub Release object
# (with the demo PDF) on every v* tag; this workflow only publishes to PyPI.
#
# Publishing uses PyPI Trusted Publishing (OIDC) — no API token / secret. It
# requires a matching pending/active trusted publisher configured on PyPI for
# (owner=YuZh98, repo=latex2ufdissertation, workflow=publish.yml, environment=pypi).
on:
  push:
    tags:
      - 'v1.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    # The `pypi` environment (repo Settings -> Environments) scopes the OIDC
    # binding and restricts deployments to v* tags.
    environment: pypi
    permissions:
      id-token: write # required for trusted publishing (OIDC)
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: '3.12'

      - name: Build sdist + wheel
        run: |
          pip install build
          python -m build

      - name: Publish to PyPI (trusted publishing)
        uses: pypa/gh-action-pypi-publish@release/v1
