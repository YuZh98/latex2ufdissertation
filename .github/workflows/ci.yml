name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pre-commit:
    name: pre-commit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install pre-commit
      - run: pre-commit run --all-files --show-diff-on-failure

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - run: pip install -e ".[dev]"
      # Coverage ratchet: floor is the current measured baseline, target is
      # 85% per CONTRIBUTING.md. Bump the floor whenever a PR raises actual
      # coverage so it does not regress.
      - name: pytest with coverage
        run: pytest --cov=latex2ufdissertation --cov-report=term-missing --cov-report=xml --cov-fail-under=50
      - name: Deprecation-strict pytest
        run: pytest -W error::DeprecationWarning
      - name: Upload coverage XML
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: error
          retention-days: 7
